{% extends 'posts/base.html' %}
{% block title %}Delete Post - PixelGram{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card form-card">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                <h4 class="mt-3">Delete this post?</h4>
                <p class="text-muted">"{{ post.title }}" will be permanently removed. This cannot be undone.</p>

                <img src="{{ post.image.url }}" class="img-fluid rounded my-3" style="max-height:220px;">

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger flex-fill">Yes, delete</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
